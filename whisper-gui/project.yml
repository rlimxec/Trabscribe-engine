name: whisper-gui
options:
  bundleIdPrefix: com.whisper
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  SWIFT_VERSION: "6.0"
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  SWIFT_STRICT_CONCURRENCY: targeted
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"

targets:
  whisper-gui:
    type: application
    platform: macOS
    sources:
      - Sources
    info:
      path: Info.plist
      properties:
        CFBundleName: whisper-gui
        CFBundleDisplayName: whisper-gui
        CFBundleIdentifier: com.whisper.whisper-gui
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        NSHighResolutionCapable: true
    entitlements:
      path: whisper-gui.entitlements
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.whisper.whisper-gui
      INFOPLIST_FILE: Info.plist
      CODE_SIGN_STYLE: Automatic
      ENABLE_HARDENED_RUNTIME: true
